name: Auto reF1nd Android arm64

on:
  workflow_dispatch:
    inputs:
      release_kind:
        description: "Release kind (stable or testing)"
        required: true
        type: choice
        options:
          - stable
          - testing
      tag:
        description: "Upstream release tag; leave empty for latest"
        required: false
        type: string
      force_build:
        description: "Build even if the release already exists"
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "17 20 * * *"  # stable
    - cron: "37 20 * * *"  # testing

permissions:
  contents: write

concurrency:
  group: auto-ref1nd-${{ github.event.inputs.release_kind || 'scheduled' }}
  cancel-in-progress: false

jobs:
  determine-matrix:
    name: Determine build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # 手动触发：使用用户选择的 release_kind
            echo "matrix={\"include\":[{\"release_kind\":\"${{ inputs.release_kind }}\"}]}" >> "$GITHUB_OUTPUT"
          else
            # 定时触发：根据 cron 时间判断
            hour=$(date -u +%H)
            minute=$(date -u +%M)
            if [[ "$hour" == "20" && "$minute" == "17" ]]; then
              echo "matrix={\"include\":[{\"release_kind\":\"stable\"}]}" >> "$GITHUB_OUTPUT"
            elif [[ "$hour" == "20" && "$minute" == "37" ]]; then
              echo "matrix={\"include\":[{\"release_kind\":\"testing\"}]}" >> "$GITHUB_OUTPUT"
            else
              # 其他时间：同时构建两个
              echo "matrix={\"include\":[{\"release_kind\":\"stable\"},{\"release_kind\":\"testing\"}]}" >> "$GITHUB_OUTPUT"
            fi
          fi

  build:
    name: Build ${{ matrix.release_kind }} Android arm64
    runs-on: ubuntu-latest
    needs: determine-matrix
    strategy:
      matrix: ${{ fromJson(needs.determine-matrix.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout build recipes
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ~1.25.10
          cache: false

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28
          local-cache: true

      - name: Build and publish
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_SOURCE_REPO: reF1nd/sing-box
          UPSTREAM_RELEASE_REPO: reF1nd/sing-box-releases
          RELEASE_KIND: ${{ matrix.release_kind }}
          PATCH_FILE: patches/provider.patch
          INPUT_TAG: ${{ inputs.tag }}
          FORCE_BUILD: ${{ inputs.force_build }}
        run: bash scripts/build-android-arm64.sh
